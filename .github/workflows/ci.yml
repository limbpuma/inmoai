name: CI/CD Pipeline

on:
  push:
    branches: [master, develop, 'feature/**']
  pull_request:
    branches: [master, develop]
  schedule:
    # Run every 72 hours (every 3 days at 03:00 UTC)
    - cron: '0 3 */3 * *'
  workflow_dispatch:

env:
  NODE_VERSION: '20'
  API_DIR: apps/api
  WEB_DIR: apps/web

jobs:
  # ============================================
  # LINT & TYPECHECK
  # ============================================
  lint:
    name: Lint & Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install API dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Lint API
        working-directory: ${{ env.API_DIR }}
        run: npm run lint

      - name: Lint Web
        working-directory: ${{ env.WEB_DIR }}
        run: npm run lint

      - name: Typecheck API
        working-directory: ${{ env.API_DIR }}
        run: npm run typecheck

  # ============================================
  # UNIT TESTS
  # ============================================
  test-unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Run unit tests with coverage
        working-directory: ${{ env.API_DIR }}
        run: npm run test:coverage -- --reporter=default --reporter=junit --outputFile=../../test-results/junit.xml
        env:
          NODE_ENV: test

      - name: Upload coverage report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report
          path: ${{ env.API_DIR }}/coverage/
          retention-days: 30

      - name: Upload test results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: test-results/
          retention-days: 30

  # ============================================
  # BUILD VALIDATION
  # ============================================
  build:
    name: Build
    runs-on: ubuntu-latest
    needs: lint
    strategy:
      matrix:
        app: [api, web]
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install dependencies
        working-directory: apps/${{ matrix.app }}
        run: npm ci

      - name: Build
        working-directory: apps/${{ matrix.app }}
        run: npm run build
        env:
          # Minimal env for build validation
          DATABASE_URL: 'postgresql://build:build@localhost:5432/build'
          NEXTAUTH_SECRET: 'build-secret'
          NEXTAUTH_URL: 'http://localhost:3000'

      - name: Upload build artifact
        uses: actions/upload-artifact@v4
        with:
          name: build-${{ matrix.app }}
          path: apps/${{ matrix.app }}/.next/
          retention-days: 7

  # ============================================
  # E2E TESTS (Playwright)
  # ============================================
  test-e2e:
    name: E2E Tests
    runs-on: ubuntu-latest
    needs: build
    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: inmoai
          POSTGRES_PASSWORD: inmoai_test
          POSTGRES_DB: inmoai_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: 'npm'

      - name: Install API dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm ci

      - name: Install Web dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm ci

      - name: Install Playwright browsers
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright install --with-deps chromium

      - name: Run DB migrations
        working-directory: ${{ env.API_DIR }}
        run: npx drizzle-kit push
        env:
          DATABASE_URL: postgresql://inmoai:inmoai_test@localhost:5432/inmoai_test

      - name: Seed test data
        working-directory: ${{ env.API_DIR }}
        run: npm run db:seed
        env:
          DATABASE_URL: postgresql://inmoai:inmoai_test@localhost:5432/inmoai_test
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:9091

      - name: Start API server
        working-directory: ${{ env.API_DIR }}
        run: npm run dev &
        env:
          DATABASE_URL: postgresql://inmoai:inmoai_test@localhost:5432/inmoai_test
          NEXTAUTH_SECRET: test-secret
          NEXTAUTH_URL: http://localhost:9091
          NODE_ENV: test

      - name: Start Web server
        working-directory: ${{ env.WEB_DIR }}
        run: npm run dev &
        env:
          NEXT_PUBLIC_API_URL: http://localhost:9091
          NEXTAUTH_URL: http://localhost:9090

      - name: Wait for servers
        run: |
          npx wait-on http://localhost:9091 http://localhost:9090 --timeout 60000

      - name: Run E2E tests
        working-directory: ${{ env.WEB_DIR }}
        run: npx playwright test
        env:
          BASE_URL: http://localhost:9090
          API_URL: http://localhost:9091

      - name: Upload E2E results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: e2e-results
          path: |
            ${{ env.WEB_DIR }}/playwright-report/
            ${{ env.WEB_DIR }}/test-results/
          retention-days: 30

  # ============================================
  # SECURITY AUDIT
  # ============================================
  security:
    name: Security Audit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}

      - name: Audit API dependencies
        working-directory: ${{ env.API_DIR }}
        run: npm audit --audit-level=high || true

      - name: Audit Web dependencies
        working-directory: ${{ env.WEB_DIR }}
        run: npm audit --audit-level=high || true

  # ============================================
  # DOCKER BUILD
  # ============================================
  docker:
    name: Docker Build
    runs-on: ubuntu-latest
    needs: [test-unit, build]
    if: github.ref == 'refs/heads/master' || github.ref == 'refs/heads/develop'
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build API image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/api/Dockerfile
          push: false
          tags: inmoai-api:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build Web image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: ./apps/web/Dockerfile
          push: false
          tags: inmoai-web:${{ github.sha }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

  # ============================================
  # 72-HOUR HEALTH CHECK (scheduled only)
  # ============================================
  health-check:
    name: 72h Health Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule'
    needs: [test-unit, test-e2e, security]
    steps:
      - name: Summary
        run: |
          echo "## 72-Hour Automated Health Check" >> $GITHUB_STEP_SUMMARY
          echo "- Unit tests: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- E2E tests: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Security audit: PASSED" >> $GITHUB_STEP_SUMMARY
          echo "- Timestamp: $(date -u)" >> $GITHUB_STEP_SUMMARY

      - name: Notify on failure
        if: failure()
        uses: actions/github-script@v7
        with:
          script: |
            github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: '72h Health Check Failed - ' + new Date().toISOString().split('T')[0],
              body: '## Automated Health Check Failed\n\nThe scheduled 72-hour health check has detected failures.\n\nPlease review the [workflow run](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ').',
              labels: ['bug', 'automated', 'health-check']
            })
